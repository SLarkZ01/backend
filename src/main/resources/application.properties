spring.application.name=backend

# PostgreSQL config (defaults for local Docker)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/techstock_db}
spring.datasource.username=${DB_USERNAME:techstock_user}
spring.datasource.password=${DB_PASSWORD:techstock_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

# Optional: SQL formatting in logs
spring.jpa.properties.hibernate.format_sql=true

# CORS for Next.js frontend
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
