name: CI Backend

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-openapi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Grant execute permissions
        run: chmod +x mvnw scripts/export-openapi.sh

      - name: Run tests
        run: ./mvnw -q test

      - name: Export OpenAPI
        run: scripts/export-openapi.sh

      - name: Validate OpenAPI files
        run: |
          test -f docs/openapi/openapi.json
          test -f docs/openapi/openapi.yaml

      - name: Upload OpenAPI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: docs/openapi/*
